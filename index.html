<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANAYI CARDS</title>
    
    <!-- Стили подключаются в порядке зависимости -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- =========================================================================
    ШАПКА САЙТА
    ========================================================================= -->
    <header class="site-header">
        <div class="header-content">
            <h1 class="site-title">DANAYI_CARDS</h1>
            <div class="language-switcher">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ru">RU</button>
                <!-- Деактивированные языки (скрыты через CSS) -->
                <button class="lang-btn disabled" data-lang="fa" title="Coming Soon">FA</button>
                <button class="lang-btn disabled" data-lang="es" title="Coming Soon">ES</button>
                <button class="lang-btn disabled" data-lang="kk" title="Coming Soon">KK</button>
            </div>
        </div>
    </header>

    <!-- =========================================================================
    ОСНОВНОЙ КОНТЕНТ
    ========================================================================= -->
    <main class="site-main">
        
        <!-- =====================================================================
        БЛОК КАРТОЧЕК #1 (Главный)
        Для добавления нового блока скопируйте этот div и измените data-block-id
        ====================================================================== -->
        <section class="card-block" data-block-id="block-1">
            <div class="block-header">
                <h2 class="block-title" data-i18n="block1_title">MAIN COLLECTION</h2>
                <span class="block-decoration">═══════════════════════</span>
            </div>
            
            <div class="danayi-wrapper">
                <div class="danayi-cards" data-block-id="block-1">
                    <!-- Карточки рендерятся через JavaScript -->
                </div>
                
                <button class="danayi-add-btn" data-block-id="block-1">
                    <span class="btn-text">+ ADD_CARD</span>
                </button>
            </div>
        </section>

        <!-- =====================================================================
        БЛОК КАРТОЧЕК #2 (Пример второго блока)
        Раскомментируйте для использования
        ====================================================================== -->
        <!--
        <section class="card-block" data-block-id="block-2">
            <div class="block-header">
                <h2 class="block-title" data-i18n="block2_title">SECONDARY COLLECTION</h2>
                <span class="block-decoration">═══════════════════════</span>
            </div>
            
            <div class="danayi-wrapper">
                <div class="danayi-cards" data-block-id="block-2"></div>
                <button class="danayi-add-btn" data-block-id="block-2">
                    <span class="btn-text">+ ADD_CARD</span>
                </button>
            </div>
        </section>
        -->

    </main>

    <!-- =========================================================================
    ПОДВАЛ САЙТА
    ========================================================================= -->
    <footer class="site-footer">
        <div class="footer-content">
            <span class="footer-text">© 2024 DANAYI_CARDS</span>
            <span class="footer-decoration">///</span>
            <span class="footer-text">NOIR_BRUTALISM_EDITION</span>
        </div>
    </footer>

    <!-- =========================================================================
    МОДАЛЬНЫЕ ОКНА (СКРЫТЫ ПО УМОЛЧАНИЮ)
    ========================================================================= -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">NEW_CARD</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Содержимое заполняется через JavaScript -->
            </div>
        </div>
    </div>

    <!-- =========================================================================
    КОНТЕКСТНОЕ МЕНЮ (СКРЫТО ПО УМОЛЧАНИЮ)
    ========================================================================= -->
    <div id="context-menu" class="context-menu hidden"></div>

    <!-- =========================================================================
    УВЕДОМЛЕНИЯ (TOAST)
    ========================================================================= -->
    <div id="toast-container"></div>

    <!-- =========================================================================
    СКРИПТЫ (в порядке загрузки)
    ========================================================================= -->
    <script src="js/config.js"></script>
    <script src="js/data-loader.js"></script>
    <script src="js/card-manager.js"></script>
    <script src="js/ui-manager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
